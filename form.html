<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    <style>
        body{
            background-color: #fcf8f2;
        }
        #container{
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            height: 100vh;
        }
        #password{
            margin-top: 25px;
            margin-bottom: 25px;
            height: 50px;
            width: 300px;
            border: 4px solid #607456;
            border-radius: 10px;
            font-size: larger;
        }
        #userEmail{
            height: 50px;
            width: 300px;
            border: 4px solid #607456;
            border-radius: 10px;
            font-size: larger;
        }
        #login{
            height: 50px;
            width: 300px;
            border: 4px solid #7B2525;
            border-radius: 10px;
            font-size: x-large;
            color: #c23e3e;

        }
        #loginForm{
            border: 10px solid #7B2525;
            padding: 50px;
            border-radius: 18px;
            background-color: #efeae4;
        }

    </style>
</head>
<body>
 <div id="container">
  <form id="loginForm">
    <input type="email" placeholder="Enter Email" id="userEmail">
    <br>
    <input type="password" placeholder="Enter Password" id="password">
    <br>
    <button type="submit" id="login">Login</button>
    
  </form>
  <p id="Successful"></p>
 </div>


<script>
    let form = document.getElementById("loginForm");
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let userEmail = document.getElementById("userEmail");
        let password = document.getElementById("password");
        let Successful = document.getElementById("Successful");

        if(userEmail.value === ""){
            alert("Email Required");
        }
        else if(password.value === ""){
            alert("Password Required");
        }
        else if(password.value.length < 6){
            alert("Password is too short");
        }
        else{
            form.style.display = "none";

                Successful.textContent = "Login Successful";
                Successful.style.fontSize = "40px";
                Successful.style.color = "#7B2525";
                Successful.style.fontWeight = "bold";
        }
    });
</script>
</body>
</html>
